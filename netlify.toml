[images]
remote_images = [
  "https://picsum\\.photos/.*",
  "https://images\\.unsplash\\.com/.*",
  "https://placehold\\.co/.*"
]

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, max-age=0, stale-while-revalidate=86400"
